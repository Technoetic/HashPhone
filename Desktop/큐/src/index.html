<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티켓 예매 대기열 시뮬레이터</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/queue.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="app-container">

    <!-- 상단: 타이틀 + 개념 -->
    <header class="top-bar">
      <h1 class="app-title">🎫 티켓 예매 대기열</h1>
      <div class="fifo-badge">선입선출 (FIFO) : 먼저 온 사람이 먼저 입장!</div>
    </header>

    <!-- 설명 배너 -->
    <div id="explain-banner" class="explain-banner hidden" aria-live="polite">
      <span id="explain-icon" class="explain-icon"></span>
      <span id="explain-text" class="explain-text"></span>
    </div>

    <!-- 메인 레이아웃: 2단 -->
    <div class="main-layout">

      <!-- 왼쪽: 입장 영역 + 상태 -->
      <div class="left-panel">
        <div class="panel-card admission-panel">
          <div class="panel-title">🚪 예매 페이지</div>
          <div id="admission-area" class="admission-area">
            <div class="admission-empty">대기 중…</div>
          </div>
        </div>

        <div class="panel-card status-panel">
          <div class="status-row">
            <div class="status-item">
              <span class="status-label">Peek <small>맨 앞 확인</small></span>
              <span id="status-peek" class="status-value">없음</span>
            </div>
            <div class="status-item">
              <span class="status-label">Size <small>대기 인원</small></span>
              <span id="status-size" class="status-value">0<small>명</small></span>
            </div>
            <div class="status-item">
              <span class="status-label">isEmpty <small>비어있나?</small></span>
              <span id="status-empty" class="status-value"><span class="badge badge-true">네</span></span>
            </div>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 대기열 -->
      <div class="right-panel">
        <div class="panel-card queue-panel">
          <div class="queue-header">
            <span class="direction-out">← 입장 (앞)</span>
            <span class="panel-title">🧍 대기열</span>
            <span class="direction-in">도착 (뒤) →</span>
          </div>
          <div id="queue-container" class="queue-container" role="list"></div>
          <div id="queue-empty-msg" class="queue-empty-message">
            <div class="empty-text">🎫 줄이 비어있어요! "대기 참가"를 눌러보세요</div>
          </div>
        </div>
      </div>

    </div>

    <!-- 하단: 버튼 -->
    <div class="bottom-controls">
      <button id="btn-enqueue" class="btn btn-enqueue" type="button">
        <span class="btn-label">➕ 대기 참가</span>
        <span class="btn-method">Enqueue</span>
        <span class="btn-desc">맨 뒤에 줄서기</span>
      </button>
      <button id="btn-dequeue" class="btn btn-dequeue" type="button">
        <span class="btn-label">🚪 입장 허용</span>
        <span class="btn-method">Dequeue</span>
        <span class="btn-desc">맨 앞 사람 입장</span>
      </button>
      <button id="btn-peek" class="btn btn-peek" type="button">
        <span class="btn-label">👀 맨 앞 확인</span>
        <span class="btn-method">Peek</span>
        <span class="btn-desc">살짝 확인만</span>
      </button>
      <button id="btn-clear" class="btn btn-clear" type="button">
        <span class="btn-label">🗑️ 초기화</span>
        <span class="btn-method">Clear</span>
        <span class="btn-desc">전부 비우기</span>
      </button>
    </div>

  </div>

  <script src="js/Person.js"></script>
  <script src="js/Queue.js"></script>
  <script src="js/AnimationManager.js"></script>
  <script src="js/QueueSimulator.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
